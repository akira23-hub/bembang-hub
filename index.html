<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boldilocks | Premium Streaming</title>
    <style>
        :root {
            --primary: #e91e63;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }
        body { background: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: var(--text-main); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* Header */
        .menu-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .logo-img { height: 60px; cursor: pointer; }
        .menu-links { display: flex; gap: 25px; align-items: center; }
        .menu-links a { color: var(--text-dim); text-decoration: none; font-size: 15px; font-weight: 600; cursor: pointer; }
        .search-container { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; gap: 5px; }
        #searchInput { background: transparent; border: none; color: white; outline: none; width: 150px; }

        /* Mobile Controls */
        .mobile-actions { display: none; gap: 15px; }
        .icon-btn { font-size: 24px; cursor: pointer; color: var(--primary); }
        #mobileSearchWrapper { display: none; background: #1a1a1a; padding: 10px; border-bottom: 2px solid var(--primary); width: 100%; box-sizing: border-box; }
        #mobileSearchWrapper.active { display: flex; align-items: center; gap: 10px; }
        #mobileSearchInput { flex: 1; padding: 8px; background: #222; border: none; color: white; border-radius: 4px; }

        /* TAGS CAROUSEL */
        .carousel-wrapper { position: relative; display: flex; align-items: center; margin: 10px 0; }
        .tags-carousel { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; scroll-behavior: smooth; flex: 1; }
        .tags-carousel::-webkit-scrollbar { display: none; }
        .carousel-tag { white-space: nowrap; background: #1a1a1a; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #333; flex-shrink: 0; }
        .nav-arrow { background: rgba(0, 0, 0, 0.6); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; font-weight: bold; }

        /* Sectioning */
        .section-label { color: var(--primary); font-size: 18px; font-weight: bold; text-transform: uppercase; margin: 20px 0 15px 0; border-left: 4px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { cursor: pointer; }
        .thumb-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; margin-bottom: 6px; border-radius: 4px; overflow: hidden; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .title { font-size: 14px; color: #eee; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* PLAYER - THE FIX IS HERE */
        #player { display: none; margin-bottom: 40px; }
        .video-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            background-color: #000; 
            background-size: cover; 
            background-position: center; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #mainVideo, #mainIframe { width: 100%; height: 100%; border: none; display: none; }
        .play-overlay-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--primary); color: white; border: none; border-radius: 50%; 
            width: 70px; height: 70px; font-size: 28px; cursor: pointer; z-index: 20; 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
        }

        .download-btn { display: inline-block; padding: 12px 30px; background: var(--primary); color: white; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 20px 0; text-decoration: none; }
        .tag-pill { display: inline-block; background: #252525; color: var(--text-dim); padding: 5px 12px; border-radius: 4px; font-size: 12px; margin: 5px 5px 0 0; cursor: pointer; border: 1px solid #333; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 40px 0; }
        .page-btn { background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px 25px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 768px) {
            .menu-links, .search-container, .nav-arrow { display: none; }
            .mobile-actions { display: flex; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .logo-img { height: 45px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="menu-bar">
        <img src="https://zpi.cx/b/PS3BgJ5.png" class="logo-img" onclick="goHome(true)">
        <div class="menu-links">
            <a onclick="goHome(true)">Home</a>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') desktopSearch()">
            </div>
        </div>
        <div class="mobile-actions">
            <div class="icon-btn" onclick="toggleMobileSearch()">🔍</div>
            <div class="icon-btn" onclick="goHome(true)">🏠</div>
        </div>
    </div>
    
    <div id="mobileSearchWrapper">
        <input type="text" id="mobileSearchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') mobileSearch()">
    </div>

    <div id="homeContent">
        <div class="carousel-wrapper">
            <button class="nav-arrow" onclick="scrollTags(-1)">&#10094;</button>
            <div id="tagsCarousel" class="tags-carousel"></div>
            <button class="nav-arrow" onclick="scrollTags(1)">&#10095;</button>
        </div>

        <div id="featuredSection">
            <div class="section-label">Featured Videos</div>
            <div id="featuredGrid" class="grid"></div>
        </div>

        <div class="section-label">All Videos</div>
        <div id="videoGrid" class="grid"></div>
        <div id="pagination" class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Prev</button>
            <span id="pageNumber">Page 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next</button>
        </div>
    </div>

    <div id="player">
        <div class="video-container" id="playerContainer">
            <button id="startPlayBtn" class="play-overlay-btn" onclick="triggerActualPlay()">▶</button>
            <video id="mainVideo" controls playsinline></video>
            <iframe id="mainIframe" allowfullscreen></iframe>
        </div>
        <h1 id="playerTitle" style="font-size: 20px; margin-top: 20px;"></h1>
        <div id="tagsContainer"></div>
        <div id="downloadBtn" class="download-btn" onclick="handleDownloadClick()">⬇ DOWNLOAD VIDEO</div>
        <div style="color:var(--primary); font-weight:bold; margin-top:30px; margin-bottom:15px;">Related Videos</div>
        <div id="relatedGrid" class="grid"></div>
    </div>
</div>

<script>
const adLinks = ["https://omg10.com/4/8251888", "https://omg10.com/4/7512585"];
let adCounter = 0;
let DOWNLOAD_PAGE = ""; 

const videos = [
    { id: 0, title:"I can't resist you", mp4:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://download.boldilocks.xyz/dl1", thumbnail:"https://zpi.cx/b/hOW88T.jpg", tags: ["wife", "sexy"] },
    { id: 1, title:"Lets pluck your cherry", mp4:"https://zpi.cx/s4/Itrwoc4.mp4", download:"https://download.boldilocks.xyz/dl2", thumbnail:"https://zpi.cx/b/fGSLT5U.png", tags: ["blonde", "defloration"] },
    { id: 2, title:"I really miss you", mp4:"https://cdn.veporn.com/im-here-to-let-the-sin-in-me.mp4", download:"https://download.boldilocks.xyz/dl3", thumbnail:"https://zpi.cx/b/7z07poS.png", tags: ["shaved", "sins"] },
    { id: 3, title:"Really wet", mp4:"https://cdn.veporn.com/you-want-me-dry-and-yet-im-wet.mp4", download:"https://download.boldilocks.xyz/dl4", thumbnail:"https://zpi.cx/b/IABMG.png", tags: ["creampie", "wet"] },
    { id: 4, title:"Let's enjoy the moment", mp4:"https://cdn.veporn.com/you-are-better-at-this-than-you-thought.mp4", download:"https://download.boldilocks.xyz/dl5", thumbnail:"https://zpi.cx/b/56F4bA4.png", tags: ["lesbians"] },
    { id: 5, title:"Step Mom is in heat", mp4:"https://cdn.save.moe/s12/ru3OE6W.mp4", download:"https://download.boldilocks.xyz/dl6", thumbnail:"https://zpi.cx/b/c2d8b.jpg", tags: ["mom", "stepmom"] },
    { id: 6, title:"Cure for migraines", mp4:"https://cdn.veporn.com/an-old-cure-for-migraines.mp4", download:"https://download.boldilocks.xyz/dl7", thumbnail:"https://zpi.cx/b/SQGSD6.png", tags: ["doctor", "nurse"] },
    { id: 7, title:"Pussy Pounded & Creampied", mp4:"https://cdn.save.moe/s4/ldZJGb.mp4", download:"https://download.boldilocks.xyz/dl8", thumbnail:"https://zpi.cx/b/LKv1NiS.jpg", tags: ["hardsex", "creampie"] },
    { id: 8, title:"Celine Umali Pinay", embed:"https://sendvid.com/embed/b0tura79", download:"https://download.boldilocks.xyz/dl9", thumbnail:"https://zpi.cx/b/11Fzu.jpg", tags: ["pinay", "asia"] },
    { id: 9, title:"Knowledge makes me wet", mp4:"https://cdn.veporn.com/see-how-wet-knowledge-makes-me.mp4", download:"https://download.boldilocks.xyz/dl10", thumbnail:"https://zpi.cx/b/ey4hdA.png", tags: ["creampie", "teen"] },
    { id: 10, title:"You're not just good your're so damn fine", mp4:"https://cdn.veporn.com/youre-not-just-good-youre-so-damn-fine.mp4", download:"https://download.boldilocks.xyz/dl11", thumbnail:"https://zpi.cx/b/H4XzTJe.png", tags: ["anal", "big tits", "creampie"] },
    { id: 11, title:"My wife miss my black Dick", mp4:"https://cdn.save.moe/s12/r7EoV6.mp4", download:"https://download.boldilocks.xyz/dl12", thumbnail:"https://zpi.cx/b/vp1dK.jpg", tags: ["anal", "wife", "creampie"] }
];

let filteredVideos = [...videos];
let currentPage = 1;

function initCarousel() {
    const carousel = document.getElementById('tagsCarousel');
    const allTags = [...new Set(videos.flatMap(v => v.tags))].sort();
    carousel.innerHTML = '<div class="carousel-tag" onclick="goHome(true)">All</div>';
    allTags.forEach(tag => {
        const div = document.createElement('div');
        div.className = 'carousel-tag';
        div.innerText = tag.charAt(0).toUpperCase() + tag.slice(1);
        div.onclick = () => performSearch(tag);
        carousel.appendChild(div);
    });
}

function scrollTags(dir) { document.getElementById('tagsCarousel').scrollLeft += dir * 250; }

function renderGrid(targetId, list, paginate = false) {
    const grid = document.getElementById(targetId);
    grid.innerHTML = '';
    let displayList = list;
    if (paginate) {
        const limit = window.innerWidth <= 768 ? 8 : 12;
        const start = (currentPage - 1) * limit;
        displayList = list.slice(start, start + limit);
        document.getElementById('pageNumber').textContent = `Page ${currentPage}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = (start + limit) >= list.length;
    }
    displayList.forEach(v => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="thumb-wrapper"><img src="${v.thumbnail}"></div><div class="title">${v.title}</div>`;
        card.onclick = () => { openAdTab(); window.location.hash = `#video/${v.id}`; };
        grid.appendChild(card);
    });
}

function handleRoute() {
    const hash = window.location.hash;
    if (hash.startsWith('#video/')) {
        const id = parseInt(hash.split('/')[1]);
        const video = videos.find(v => v.id === id);
        if (video) {
            DOWNLOAD_PAGE = video.download; 
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('player').style.display = 'block';
            document.getElementById('playerTitle').textContent = video.title;
            
            // RESET PLAYER VIEW
            document.getElementById('startPlayBtn').style.display = 'flex';
            document.getElementById('mainVideo').style.display = 'none';
            document.getElementById('mainIframe').style.display = 'none';
            document.getElementById('mainVideo').src = "";
            document.getElementById('mainIframe').src = "";
            
            // SHOW PREVIEW THUMBNAIL
            document.getElementById('playerContainer').style.backgroundImage = `url(${video.thumbnail})`;

            const tagsDiv = document.getElementById('tagsContainer');
            tagsDiv.innerHTML = '';
            video.tags.forEach(t => {
                const s = document.createElement('span'); s.className='tag-pill'; s.innerText='#'+t;
                s.onclick = () => performSearch(t); tagsDiv.appendChild(s);
            });

            const related = videos.filter(v => v.id !== id && v.tags.some(t => video.tags.includes(t))).slice(0, 4);
            renderGrid('relatedGrid', related.length > 0 ? related : videos.slice(0, 4));
            window.scrollTo(0,0);
        }
    } else {
        document.getElementById('player').style.display = 'none';
        document.getElementById('homeContent').style.display = 'block';
        const featured = videos.slice(-4).reverse();
        const featuredIds = featured.map(v => v.id);
        const remaining = filteredVideos.filter(v => !featuredIds.includes(v.id)).reverse();
        if (filteredVideos.length === videos.length) {
            document.getElementById('featuredSection').style.display = 'block';
            renderGrid('featuredGrid', featured);
            renderGrid('videoGrid', remaining, true);
        } else {
            document.getElementById('featuredSection').style.display = 'none';
            renderGrid('videoGrid', filteredVideos.slice().reverse(), true);
        }
    }
}

function triggerActualPlay() {
    openAdTab();
    const id = parseInt(window.location.hash.split('/')[1]);
    const video = videos.find(v => v.id === id);
    document.getElementById('startPlayBtn').style.display = 'none';
    document.getElementById('playerContainer').style.backgroundImage = 'none'; 
    if (video.mp4) { 
        const v = document.getElementById('mainVideo');
        v.style.display = 'block'; v.src = video.mp4; v.play(); 
    } else { 
        const f = document.getElementById('mainIframe');
        f.style.display = 'block'; f.src = video.embed + "?autoplay=1"; 
    }
}

function openAdTab() { window.open(adLinks[adCounter % adLinks.length], '_blank'); adCounter++; }
function performSearch(q) { filteredVideos = videos.filter(v => v.title.toLowerCase().includes(q.toLowerCase()) || v.tags.some(t => t.toLowerCase().includes(q.toLowerCase()))); currentPage = 1; goHome(false); }
function goHome(reset = false) { if(reset){ filteredVideos=[...videos]; document.getElementById('searchInput').value=""; } currentPage=1; history.pushState("", "", window.location.pathname); handleRoute(); }
function handleDownloadClick() { if(DOWNLOAD_PAGE) { openAdTab(); window.location.href = DOWNLOAD_PAGE; } }
function changePage(step) { currentPage += step; window.scrollTo(0,0); handleRoute(); }
function toggleMobileSearch() { document.getElementById('mobileSearchWrapper').classList.toggle('active'); }
function desktopSearch() { performSearch(document.getElementById('searchInput').value); }
function mobileSearch() { performSearch(document.getElementById('mobileSearchInput').value); toggleMobileSearch(); }

window.addEventListener('hashchange', handleRoute);
window.onload = () => { initCarousel(); handleRoute(); };
</script>
</body>
</html>
